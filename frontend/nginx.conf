server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path serves index.html so React Router
    # can handle client-side routing.
    location / {
        try_files $uri /index.html;
    }

    # Cache hashed assets aggressively; React build hashes them per content.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No-cache for the entry HTML so deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
