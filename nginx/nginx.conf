worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream backend_api {
        # Docker DNS resolves `backend` to all healthy task IPs; scale via
        # `docker compose up --scale backend=N` and nginx will fan out.
        least_conn;
        server backend:5000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;

        # Generous timeout for held DB locks under contention.
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        location / {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            # Idempotency-Key flows through unchanged
            proxy_set_header Idempotency-Key $http_idempotency_key;
        }

        location /health {
            proxy_pass http://backend_api/health;
        }
    }
}
