services:
  # ----- Data plane -----
  postgres:
    container_name: postgres_db
    image: postgres:15
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_REAL_PORT}:${POSTGRES_REAL_PORT}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: -p ${POSTGRES_REAL_PORT}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -p ${POSTGRES_REAL_PORT}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - docker_practice

  pgbouncer:
    container_name: pgbouncer
    image: edoburu/pgbouncer:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_REAL_PORT}
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    networks:
      - docker_practice

  redis:
    container_name: redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - docker_practice

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI -> http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docker_practice

  # ----- Schema bootstrap (runs once, then exits) -----
  migrate:
    image: docker_practice_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - RUNNING_IN_DOCKER=DO-NOT-CHANGE
    env_file:
      - .env
    entrypoint: ["alembic", "upgrade", "head"]
    networks:
      - docker_practice
    restart: "no"

  # ----- Backend API replicas (behind nginx load balancer) -----
  backend:
    image: docker_practice_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - SERVICE_ROLE=api
      - RUN_MIGRATIONS=false
      - GUNICORN_WORKERS=4
      - GUNICORN_THREADS=4
      - RUNNING_IN_DOCKER=DO-NOT-CHANGE
    env_file:
      - .env
    deploy:
      replicas: 1
    expose:
      - "5000"
    networks:
      - docker_practice

  # ----- Async event consumers (also horizontally scalable) -----
  worker:
    image: docker_practice_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - SERVICE_ROLE=worker
      - RUNNING_IN_DOCKER=DO-NOT-CHANGE
    env_file:
      - .env
    deploy:
      replicas: 1
    networks:
      - docker_practice

  # ----- Edge load balancer -----
  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - docker_practice

  # ----- Frontend -----
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - docker_practice

volumes:
  postgres-data:
  redis-data:

networks:
  docker_practice:
    driver: bridge
